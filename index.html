<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Film</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #ff4747;
      --text: #f0f0f0;
      --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    h1 span { color: var(--accent); }

    .counter {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--surface); }

    th {
      text-align: left;
      padding: 1rem 1.25rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    td {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    tr:hover td { background: var(--surface); }

    .id-badge {
      display: inline-block;
      background: var(--border);
      color: var(--muted);
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: monospace;
    }

    .genere-badge {
      display: inline-block;
      background: rgba(232,255,71,0.1);
      color: var(--accent);
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      border: 1px solid rgba(232,255,71,0.25);
      letter-spacing: 0.05em;
    }

    .voto {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 500;
    }

    .voto-stars { color: var(--accent); font-size: 0.8rem; }

    .btn-row {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 4px;
      transition: all 0.15s;
      line-height: 0;
    }
    .btn-row:hover { color: var(--accent2); background: rgba(255,71,71,0.1); }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .field input, .field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field select option { background: var(--bg); }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* Star rating */
    .star-rating {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.4rem;
    }

    .star-rating input { display: none; }

    .star-rating label {
      font-size: 1.6rem;
      color: var(--border);
      cursor: pointer;
      transition: color 0.1s;
      margin: 0;
      padding: 0;
      text-transform: none;
      letter-spacing: 0;
    }

    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: var(--accent); }

    .star-rating { flex-direction: row-reverse; justify-content: flex-end; }
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: var(--accent); }
    .star-rating input:checked ~ label { color: var(--accent); }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    /* TOAST */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 200;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-size: 0.85rem;
      animation: fadeIn 0.2s ease;
      max-width: 280px;
    }
    .toast.error { border-left-color: var(--accent2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .config-banner {
      background: rgba(232,255,71,0.08);
      border: 1px solid rgba(232,255,71,0.3);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .config-banner strong { color: var(--accent); }
    .config-banner input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: monospace;
      font-size: 0.85rem;
      outline: none;
      padding: 0.2rem 0;
    }
    .config-banner input:focus { border-bottom-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>DATABASE <span>FILM</span></h1>
  <div class="counter" id="counter">— film</div>
</header>

<div class="config-banner">
  <strong>API URL:</strong>
  <input type="text" id="apiUrl" value="http://localhost:3000" placeholder="https://tuo-backend.railway.app">
  <button class="btn btn-primary" onclick="saveApiUrl()" style="padding:0.4rem 0.8rem;font-size:0.8rem;">Salva</button>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="cerca" placeholder="Cerca per titolo o genere…" oninput="cercaFilm()">
  </div>
  <button class="btn btn-primary" onclick="openModal()">+ Aggiungi</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Titolo</th>
        <th>Anno</th>
        <th>Genere</th>
        <th>Voto</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6" class="empty">Caricamento…</td></tr>
    </tbody>
  </table>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <h2>Nuovo Film</h2>
    <div class="field">
      <label>Titolo</label>
      <input type="text" id="inputTitolo" placeholder="es. Inception">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Anno di uscita</label>
        <input type="number" id="inputAnno" placeholder="es. 2010" min="1888" max="2099">
      </div>
      <div class="field">
        <label>Genere</label>
        <select id="inputGenere">
          <option value="">— seleziona —</option>
          <option>Azione</option>
          <option>Animazione</option>
          <option>Avventura</option>
          <option>Biografico</option>
          <option>Commedia</option>
          <option>Documentario</option>
          <option>Drammatico</option>
          <option>Fantascienza</option>
          <option>Fantasy</option>
          <option>Horror</option>
          <option>Musical</option>
          <option>Romance</option>
          <option>Thriller</option>
          <option>Western</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Voto (1–10)</label>
      <input type="number" id="inputVoto" placeholder="es. 8" min="1" max="10">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="aggiungiFilm()">Aggiungi</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
  let API = localStorage.getItem('filmApiUrl') || 'https://movie-db-backend-production-0271.up.railway.app';
  document.getElementById('apiUrl').value = API;

  function saveApiUrl() {
    API = document.getElementById('apiUrl').value.replace(/\/$/, '');
    localStorage.setItem('filmApiUrl', API);
    toast('URL API salvato!');
    caricaFilm();
  }

  function toast(msg, err = false) {
    const el = document.createElement('div');
    el.className = 'toast' + (err ? ' error' : '');
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function stelline(voto) {
    if (!voto) return '—';
    const pieno = Math.round(voto / 2);
    return '★'.repeat(pieno) + '☆'.repeat(5 - pieno);
  }

  async function caricaFilm(query = '') {
    const url = query
      ? `${API}/api/film/cerca?q=${encodeURIComponent(query)}`
      : `${API}/api/film`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      renderTable(data);
    } catch {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="6" class="empty">Impossibile connettersi al backend. Imposta l\'URL API corretto.</td></tr>';
    }
  }

  function renderTable(film) {
    document.getElementById('counter').textContent = `${film.length} film`;
    if (!film.length) {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="6" class="empty">Nessun film trovato.</td></tr>';
      return;
    }
    document.getElementById('tbody').innerHTML = film.map(f => `
      <tr>
        <td><span class="id-badge">#${f.id}</span></td>
        <td><strong>${f.titolo}</strong></td>
        <td>${f.anno || '—'}</td>
        <td>${f.genere ? `<span class="genere-badge">${f.genere}</span>` : '—'}</td>
        <td><span class="voto" title="${f.voto}/10">
          <span class="voto-stars">${stelline(f.voto)}</span>
          <span style="color:var(--muted);font-size:0.8rem">${f.voto ? f.voto + '/10' : '—'}</span>
        </span></td>
        <td>
          <button class="btn-row" onclick="rimuoviFilm(${f.id}, '${f.titolo.replace(/'/g, "\\'")}')" title="Rimuovi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
            </svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  let cercaTimeout;
  function cercaFilm() {
    clearTimeout(cercaTimeout);
    cercaTimeout = setTimeout(() => caricaFilm(document.getElementById('cerca').value), 300);
  }

  async function aggiungiFilm() {
    const titolo  = document.getElementById('inputTitolo').value.trim();
    const anno    = document.getElementById('inputAnno').value;
    const genere  = document.getElementById('inputGenere').value;
    const voto    = document.getElementById('inputVoto').value;

    if (!titolo) return toast('Il titolo è obbligatorio.', true);
    if (voto && (voto < 1 || voto > 10)) return toast('Il voto deve essere tra 1 e 10.', true);

    try {
      const res = await fetch(`${API}/api/film`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titolo, anno: anno || null, genere: genere || null, voto: voto || null })
      });
      if (!res.ok) throw new Error();
      closeModal();
      toast(`"${titolo}" aggiunto!`);
      caricaFilm();
    } catch { toast('Errore durante l\'aggiunta.', true); }
  }

  async function rimuoviFilm(id, titolo) {
    if (!confirm(`Rimuovere "${titolo}"?`)) return;
    try {
      const res = await fetch(`${API}/api/film/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      toast(`"${titolo}" rimosso.`);
      caricaFilm();
    } catch { toast('Errore durante la rimozione.', true); }
  }

  function openModal() {
    ['inputTitolo','inputAnno','inputVoto'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inputGenere').value = '';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('inputTitolo').focus();
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('overlay'))
      document.getElementById('overlay').classList.remove('open');
  }

  caricaFilm();
</script>
</body>
</html>
