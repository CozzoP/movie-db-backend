<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Auto</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #ff4747;
      --text: #f0f0f0;
      --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    h1 span { color: var(--accent); }

    .counter {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .btn-danger {
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--accent2);
    }
    .btn-danger:hover { background: var(--accent2); color: #fff; }

    /* TABLE */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface);
    }

    th {
      text-align: left;
      padding: 1rem 1.25rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    td {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    tr:hover td { background: var(--surface); }

    .id-badge {
      display: inline-block;
      background: var(--border);
      color: var(--muted);
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: monospace;
    }

    .btn-row {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 4px;
      transition: all 0.15s;
      line-height: 0;
    }
    .btn-row:hover { color: var(--accent2); background: rgba(255,71,71,0.1); }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    /* TOAST */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 200;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-size: 0.85rem;
      animation: fadeIn 0.2s ease;
      max-width: 280px;
    }
    .toast.error { border-left-color: var(--accent2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    /* config banner */
    .config-banner {
      background: rgba(232,255,71,0.08);
      border: 1px solid rgba(232,255,71,0.3);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .config-banner strong { color: var(--accent); }
    .config-banner input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: monospace;
      font-size: 0.85rem;
      outline: none;
      padding: 0.2rem 0;
    }
    .config-banner input:focus { border-bottom-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>DATABASE <span>AUTO</span></h1>
  <div class="counter" id="counter">— veicoli</div>
</header>

<div class="config-banner">
  <strong>API URL:</strong>
  <input type="text" id="apiUrl" value="http://localhost:3000" placeholder="https://tuo-backend.railway.app">
  <button class="btn btn-primary" onclick="saveApiUrl()" style="padding:0.4rem 0.8rem;font-size:0.8rem;">Salva</button>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="cerca" placeholder="Cerca per marca o modello…" oninput="cercaAuto()">
  </div>
  <button class="btn btn-primary" onclick="openModal()">+ Aggiungi</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Marca</th>
        <th>Modello</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="4" class="empty">Caricamento…</td></tr>
    </tbody>
  </table>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <h2>Nuova Auto</h2>
    <div class="field">
      <label>Marca</label>
      <input type="text" id="inputMarca" placeholder="es. Toyota">
    </div>
    <div class="field">
      <label>Modello</label>
      <input type="text" id="inputModello" placeholder="es. Corolla">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="aggiungiAuto()">Aggiungi</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
  let API = localStorage.getItem('autoApiUrl') || 'http://localhost:3000';
  document.getElementById('apiUrl').value = API;

  function saveApiUrl() {
    API = document.getElementById('apiUrl').value.replace(/\/$/, '');
    localStorage.setItem('autoApiUrl', API);
    toast('URL API salvato!');
    caricaAuto();
  }

  function toast(msg, err = false) {
    const el = document.createElement('div');
    el.className = 'toast' + (err ? ' error' : '');
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  async function caricaAuto(query = '') {
    const url = query
      ? `${API}/api/auto/cerca?q=${encodeURIComponent(query)}`
      : `${API}/api/auto`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      renderTable(data);
    } catch {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="4" class="empty">Impossibile connettersi al backend. Imposta l\'URL API corretto.</td></tr>';
    }
  }

  function renderTable(auto) {
    document.getElementById('counter').textContent = `${auto.length} veicol${auto.length === 1 ? 'o' : 'i'}`;
    if (!auto.length) {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="4" class="empty">Nessuna auto trovata.</td></tr>';
      return;
    }
    document.getElementById('tbody').innerHTML = auto.map(a => `
      <tr>
        <td><span class="id-badge">#${a.id}</span></td>
        <td>${a.marca}</td>
        <td>${a.modello}</td>
        <td>
          <button class="btn-row" onclick="rimuoviAuto(${a.id}, '${a.marca} ${a.modello}')" title="Rimuovi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
            </svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  let cercaTimeout;
  function cercaAuto() {
    clearTimeout(cercaTimeout);
    cercaTimeout = setTimeout(() => caricaAuto(document.getElementById('cerca').value), 300);
  }

  async function aggiungiAuto() {
    const marca = document.getElementById('inputMarca').value.trim();
    const modello = document.getElementById('inputModello').value.trim();
    if (!marca || !modello) return toast('Compila tutti i campi.', true);
    try {
      const res = await fetch(`${API}/api/auto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ marca, modello })
      });
      if (!res.ok) throw new Error();
      closeModal();
      toast(`${marca} ${modello} aggiunto!`);
      caricaAuto();
    } catch { toast('Errore durante l\'aggiunta.', true); }
  }

  async function rimuoviAuto(id, nome) {
    if (!confirm(`Rimuovere "${nome}"?`)) return;
    try {
      const res = await fetch(`${API}/api/auto/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      toast(`${nome} rimosso.`);
      caricaAuto();
    } catch { toast('Errore durante la rimozione.', true); }
  }

  function openModal() {
    document.getElementById('inputMarca').value = '';
    document.getElementById('inputModello').value = '';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('inputMarca').focus();
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('overlay'))
      document.getElementById('overlay').classList.remove('open');
  }

  caricaAuto();
</script>
</body>
</html>
